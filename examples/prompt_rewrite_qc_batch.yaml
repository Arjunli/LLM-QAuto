# 帮写 Prompt L1 文本质检 — 单次全评
#
# 推荐用 Web「从 cURL 快速创建」向导生成完整配置（粘贴帮写 API cURL 即可）。
# 本文件为场景说明与评委维度参考；endpoint / 入参须按实际帮写接口填写。
#
# 使用前：ZHIYUAN_BEARER_TOKEN、TENANT_ID；评委 LLM 见 .env
#
meta:
  name: prompt-rewrite-qc-batch
  version: "1.0.0"
  description: "AI 帮写 Prompt 优化 L1 文本质检 — 意图保真 / 正反向解耦 / 合规"

target:
  type: api
  connector:
    name: httpx
    config:
      endpoint: https://api.example.com/admin-api/dev/your-prompt-rewrite-api
      method: POST
      timeout: 120
      retry: 2
      concurrency: 2
      headers:
        Authorization: "Bearer ${ZHIYUAN_BEARER_TOKEN}"
        tenant-id: "${TENANT_ID}"
  input_formatter:
    name: json_payload
    template:
      id: "{{ input.variables.id | int }}"
      rawPrompt: "{{ input.variables.rawPrompt }}"
      imageType: "{{ input.variables.imageType }}"
      site: "{{ input.variables.site }}"
  output_parser:
    name: json_extractor
    path: data

data_generator:
  strategy: template_cartesian
  prompt_template: "{{ vars.id }}"
  variables:
    - name: id
      type: enum
      values: ["8001"]
    - name: rawPrompt
      type: enum
      values: ["要欧美模特，不要文字，产品小一点"]
    - name: imageType
      type: enum
      values: ["场景图"]
    - name: site
      type: enum
      values: ["DE"]
  sampling:
    total: 1

evaluation:
  aggregation_method: weighted_average
  batch_llm:
    model: gemini-3.1-pro-preview
    temperature: 0.08
    max_tokens: 4000
    max_judge_input_chars: 14000
    use_cache: true
    dimension_ids:
      - intent_fidelity
      - pos_neg_decouple
      - format_compliance
      - professional_rewrite
      - compliance_coverage
      - no_hallucination
    prompt_template: |
      你是 AI 帮写 Prompt 质检员。对比【原始口语】与【帮写 API 返回】，按维度 0～10 打分。
      硬门槛：intent_fidelity≥8.0、no_hallucination≥8.0、pos_neg_decouple≥7.5。

      【原始口语】{{ rawPrompt }}
      【图类型】{{ imageType }}
      【站点】{{ site }}

      【各维检查要点】
      1. intent_fidelity（权重 25%）：原始诉求完整保留、无曲解遗漏
      2. pos_neg_decouple（权重 20%）：正向无否定词，反向无肯定诉求；比例类转正向构图
      3. format_compliance（权重 10%）：含「正向提示词」「反向提示词」或约定格式
      4. professional_rewrite（权重 15%）：口语转商业摄影/构图等专业表达
      5. compliance_coverage（权重 15%）：无文字/Logo/水印/促销标签等合规
      6. no_hallucination（权重 15%）：不臆造颜色/材质/数量

      【待评接口返回】（已按配置截取，可能是 JSON 或纯文本）
      {{ output }}

      只输出一个 JSON 对象（不要 markdown 代码块）：
      {"dimensions":{"intent_fidelity":{"score":0-10,"categories":[],"issues":[],"evidence":""},"pos_neg_decouple":{"score":0-10,"categories":[],"issues":[],"evidence":""},"format_compliance":{"score":0-10,"categories":[],"issues":[],"evidence":""},"professional_rewrite":{"score":0-10,"categories":[],"issues":[],"evidence":""},"compliance_coverage":{"score":0-10,"categories":[],"issues":[],"evidence":""},"no_hallucination":{"score":0-10,"categories":[],"issues":[],"evidence":""}},"summary":{"overall_comment":"","risk_flags":[]}}

  dimensions:
    - id: intent_fidelity
      name: 意图保真
      weight: 0.25
      evaluators: []
    - id: pos_neg_decouple
      name: 正反向解耦
      weight: 0.20
      evaluators: []
    - id: format_compliance
      name: 格式规范
      weight: 0.10
      evaluators: []
    - id: professional_rewrite
      name: 专业化改写
      weight: 0.15
      evaluators: []
    - id: compliance_coverage
      name: 电商合规
      weight: 0.15
      evaluators: []
    - id: no_hallucination
      name: 无臆造
      weight: 0.15
      evaluators: []

pass_criteria:
  global_criteria:
    min_total_score: 7.0
  dimensions:
    - id: intent_fidelity
      min_avg_score: 8.0
    - id: no_hallucination
      min_avg_score: 8.0
    - id: pos_neg_decouple
      min_avg_score: 7.5
  statistical:
    confidence_level: 0.95
    min_sample_size: 1
