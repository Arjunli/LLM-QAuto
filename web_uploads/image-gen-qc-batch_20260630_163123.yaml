target:
  type: api
  connector:
    name: httpx
    config:
      endpoint: http://192.168.9.202:38080/admin-api/design/image-gen/init-data
      method: GET
      headers:
        Accept: application/json, text/plain, */*
        Accept-Language: zh-CN,zh;q=0.9,zh-TW;q=0.8
        Origin: http://192.168.9.202:81
        Referer: http://192.168.9.202:81/
        User-Agent: >-
          Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0
          Safari/537.36
        tenant-id: '1'
        Authorization: Bearer b835243ac5564d9a9574736cc1a12fa0
      timeout: 120
      retry: 2
      concurrency: 2
  input_formatter:
    name: json_payload
    template:
      designTaskId: '{{ input.variables.designTaskId }}'
  output_parser:
    name: json_extractor
    path: data
    content_mode: image
    media:
      urls_path: subTasks.0.images
      download: true
      max_images: 4
meta:
  name: image-gen-qc-batch
  version: 1.0.0
  description: image_gen 生图质检，校验卖点描述、全局提示词、专属微调指令对生成准确图片的帮助
  created_at: '2026-06-30T16:31:23.317118'
data_generator:
  strategy: template_cartesian
  variables:
    - name: designTaskId
      type: enum
      values:
        - '97'
  prompt_template: '{{ vars.designTaskId }}'
  sampling: {}
evaluation:
  aggregation_method: weighted_average
  dimensions:
    - id: vision_quality
      name: 画面质量与一致
      weight: 0.7
      evaluators:
        - type: vision_llm
          name: vision_judge
          dimension_id: vision_quality
          model: gpt-4o
          prompt_template: |-
            你是视觉质检员。根据待评 prompt 与生成图片，评估图文一致性、画面质量、电商合规（无文字水印）。

            待评 prompt / 接口字段（含 lastPrompt、productName 等）：
            {{ output }}

            返回 JSON：{"score":0-10,"categories":[],"issues":[],"evidence":""}
          temperature: 0.1
          max_tokens: 1800
          max_images: 2
      fail_fast: false
      description: |-
        你是视觉质检员。根据待评 prompt 与生成图片，评估图文一致性、画面质量、电商合规（无文字水印）。

        待评 prompt / 接口字段（含 lastPrompt、productName 等）：
        {{ output }}

        返回 JSON：{"score":0-10,"categories":[],"issues":[],"evidence":""}
    - id: image_delivery
      name: 图片交付
      weight: 0.3
      evaluators:
        - type: image_rule
          rules:
            - name: 至少一张图
              condition: media_count >= 1
              severity: error
            - name: 图片落盘
              condition: all_images_ok
              severity: error
pass_criteria:
  global_criteria:
    min_total_score: 6
  dimensions:
    - id: vision_quality
      min_avg_score: 6
      category_distribution: []
  statistical:
    confidence_level: 0.95
    min_sample_size: 1